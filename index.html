<!DOCTYPE html>
<html>
<head>
<title>Project Title</title>
<meta charset="utf-8">
<meta name="viewport" content="target-densitydpi=device-dpi, width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no, minimal-ui" />
<style> @-ms-viewport { width: device-width; } </style>
<link rel="stylesheet" href="vendor/reset.min.css">
<link rel="stylesheet" href="style.css">
</head>
<body class="multiple-scenes ">

<div id="pano"></div>

<div id="sceneList">
  <ul class="scenes">
    
      <a href="javascript:void(0)" class="scene" data-id="0-vue-globale">
        <li class="text">Vue Globale</li>
      </a>
    
      <a href="javascript:void(0)" class="scene" data-id="1-ville">
        <li class="text">Ville</li>
      </a>
    
      <a href="javascript:void(0)" class="scene" data-id="2-port-de-la-darse">
        <li class="text">Port de la Darse</li>
      </a>
    
      <a href="javascript:void(0)" class="scene" data-id="3-citadelle">
        <li class="text">Citadelle</li>
      </a>
    
  </ul>
</div>

<div id="introModal" 
     style="display:flex; position:fixed; top:0; left:0; width:100%; height:100%;
            background:rgba(0,0,0,0.9); justify-content:center; align-items:center; z-index:1000;">
  <div style="position:relative; width:85%; max-width:700px; background:rgba(58,68,84,0.95);
              padding:40px; border-radius:8px; max-height:80vh; overflow-y:auto;">
    <button onclick="closeIntro()" 
            style="position:absolute; top:15px; right:15px; font-size:28px;
                   color:white; background:none; border:none; cursor:pointer;">
      ✕
    </button>
    <h2 style="margin-top:0; color:#fff; font-size:24px; margin-bottom:20px;">Bienvenue</h2>
    <p id="introText" style="color:#ddd; line-height:1.6; font-size:15px; margin:0;">
      Explorez les panoramas à 360° de Villefranche-sur-Mer. Cliquez sur les différentes scènes pour naviguer entre les vues. Ouvrez les vidéos sur YouTube pour pouvoir les découvrir en 360°.
    </p>
  </div>
</div>

<div id="videoOverlay" 
     style="display:none; position:fixed; top:0; left:0; width:100%; height:100%;
            background:rgba(0,0,0,0.8); justify-content:center; align-items:center;">

  <div style="position:relative; width:80%; max-width:900px;">
    <iframe id="ytPlayer" width="100%" height="500px"
            src=""
            frameborder="0"
            allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
            allowfullscreen>
    </iframe>
  </div>

  <button onclick="closeVideo()" 
          style="position:absolute; top:20px; right:20px; font-size:30px;
                 color:white; background:none; border:none; cursor:pointer;">
    ✕
  </button>
</div>

<div id="titleBar">
  <h1 class="sceneName"></h1>
</div>

<a href="javascript:void(0)" id="autorotateToggle">
  <img class="icon off" src="img/play.png">
  <img class="icon on" src="img/pause.png">
</a>

<a href="javascript:void(0)" id="fullscreenToggle">
  <img class="icon off" src="img/fullscreen.png">
  <img class="icon on" src="img/windowed.png">
</a>

<a href="javascript:void(0)" id="sceneListToggle">
  <img class="icon off" src="img/expand.png">
  <img class="icon on" src="img/collapse.png">
</a>

<a href="javascript:void(0)" id="viewUp" class="viewControlButton viewControlButton-1">
  <img class="icon" src="img/up.png">
</a>
<a href="javascript:void(0)" id="viewDown" class="viewControlButton viewControlButton-2">
  <img class="icon" src="img/down.png">
</a>
<a href="javascript:void(0)" id="viewLeft" class="viewControlButton viewControlButton-3">
  <img class="icon" src="img/left.png">
</a>
<a href="javascript:void(0)" id="viewRight" class="viewControlButton viewControlButton-4">
  <img class="icon" src="img/right.png">
</a>
<a href="javascript:void(0)" id="viewIn" class="viewControlButton viewControlButton-5">
  <img class="icon" src="img/plus.png">
</a>
<a href="javascript:void(0)" id="viewOut" class="viewControlButton viewControlButton-6">
  <img class="icon" src="img/minus.png">
</a>

<script src="vendor/screenfull.min.js" ></script>
<script src="vendor/bowser.min.js" ></script>
<script src="vendor/marzipano.js" ></script>

<script src="data.js"></script>
<script src="index.js"></script>


<script>
function openVideo(youtubeUrl) {
  const overlay = document.getElementById("videoOverlay");
  const player = document.getElementById("ytPlayer");

  // Convertit le lien normal en lien embed
  const embedUrl = youtubeUrl.replace("watch?v=", "embed/");

  player.src = embedUrl + "?autoplay=1";
  overlay.style.display = "flex";
}

function closeVideo() {
  const overlay = document.getElementById("videoOverlay");
  const player = document.getElementById("ytPlayer");

  player.src = ""; // stop la vidéo
  overlay.style.display = "none";
}
</script>

</body>
</html>
